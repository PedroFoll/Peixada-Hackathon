<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Peixada Finanças</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --color-primary:    #0d6efd;
      --color-bg:         #f8f9fa;
      --color-bg-card:    #ffffff;
      --color-border:     #dee2e6;
      --color-text:       #212529;
      --color-muted:      #6c757d;
      --color-sidebar-bg: #1a1d23;
      --radius-lg:        16px;
      --shadow-md:        0 4px 12px rgba(0,0,0,.1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === TOPBAR === */
    .topbar-404 {
      background-color: var(--color-sidebar-bg);
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
    }

    .topbar-404__brand {
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .topbar-404__brand:hover {
      color: rgba(255,255,255,.85);
    }

    /* === HERO 404 === */
    .hero-404 {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card-404 {
      background-color: var(--color-bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 460px;
      width: 100%;
    }

    .code-404 {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: var(--color-primary);
      letter-spacing: -4px;
    }

    .icon-404 {
      font-size: 3.5rem;
      color: var(--color-muted);
      display: block;
      margin: .5rem 0 1.25rem;
    }

    /* === FOOTER === */
    .footer-404 {
      text-align: center;
      font-size: .8rem;
      color: var(--color-muted);
      padding: 1rem;
      border-top: 1px solid var(--color-border);
    }

    @media (max-width: 480px) {
      .card-404 {
        padding: 2rem 1.25rem;
      }
      .code-404 {
        font-size: 4.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Topbar mínima -->
  <header class="topbar-404" role="banner">
    <a href="/" class="topbar-404__brand" aria-label="Peixada Finanças — Página inicial">
      <i class="bi bi-fish" aria-hidden="true"></i>
      Peixada Finanças
    </a>
  </header>

  <!-- Conteúdo principal -->
  <main class="hero-404" aria-labelledby="titulo-404">
    <div class="card-404">
      <p class="code-404" aria-hidden="true">404</p>
      <i class="bi bi-map icon-404" aria-hidden="true"></i>

      <h1 class="h4 fw-bold mb-2" id="titulo-404">Página não encontrada</h1>
      <p class="text-muted mb-4">
        A página que você está tentando acessar não existe ou foi removida.
      </p>

      <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
        <a href="/" class="btn btn-primary">
          <i class="bi bi-house-door me-1" aria-hidden="true"></i>Ir para o início
        </a>
        <button type="button" class="btn btn-outline-secondary" onclick="history.back()">
          <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Voltar
        </button>
      </div>
    </div>
  </main>

  <footer class="footer-404" role="contentinfo">
    &copy; 2026 Peixada Finanças — Todos os direitos reservados
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
